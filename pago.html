<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalizar Compra | C&E Urban</title>
    <link rel="icon" href="IMAGENES/favicon.png">
    <link rel="stylesheet" href="CSS/pago.css">
</head>
<body>
    <header class="header">
        <div class="logo">
            <img src="IMAGENES/favicon.png" alt="Logo">
            <h1>C&E URBAN</h1>
        </div>

        <nav class="navbar">
            <a href="index.html">Inicio</a>
            <div class="dropdown">
                <button class="dropbtn">Productos</button>
                <div class="dropdown-content">
                    <a href="productos.html">Todos</a>
                    <a href="ropa.html">Ropa</a>
                    <a href="accesorios.html">Accesorios</a>
                    <a href="vehiculos.html">Vehículos</a>
                    <a href="tecnologia.html">Tecnología</a>
                </div>
            </div>
            <a href="index.html#collections">Colecciones</a>
            <a href="index.html#contacto">Contacto</a>
            <a href="login.html" class="login-link">Iniciar sesión</a>
            <a href="admin.html" class="admin-link">Dashboard</a>
        </nav>

        <div class="menu-toggle">☰</div>

        <div class="icons">
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Buscar...">
                <span class="search-icon">🔍</span>
            </div>
        </div>
    </header>

    <section class="checkout-page">
        <div class="checkout-container">
            <h1>Finalizar Compra</h1>

            <div class="checkout-grid">
                <!-- FORMULARIO CLIENTE -->
                <form class="checkout-form" id="payment-form">
                    <input id="customer-name" name="customerName" type="text" placeholder="Nombre completo" required>
                    <input id="customer-email" name="customerEmail" type="email" placeholder="Correo electrónico" required>
                    <input id="customer-address" name="customerAddress" type="text" placeholder="Dirección de envío" required>
                    <input id="customer-city" name="customerCity" type="text" placeholder="Ciudad" required>
                    <input id="customer-phone" name="customerPhone" type="tel" placeholder="Teléfono de contacto" required>
                    
                    <select id="payment-method" name="paymentMethod" required>
                        <option value="">Selecciona método de pago</option>
                        <option value="tarjeta">Tarjeta de Crédito / Débito</option>
                        <option value="nequi">Nequi</option>
                        <option value="daviplata">Daviplata</option>
                        <option value="pse">PSE</option>
                    </select>

                    <button type="submit">PAGAR AHORA</button>
                </form>

                <!-- RESUMEN DINÁMICO -->
                <div class="checkout-summary">
                    <h2>Resumen de Compra</h2>
                    <div class="summary-items" id="summary-items-container">
                        <!-- Llenado automático con JS -->
                    </div>
                    <div class="summary-total">
                        <p>Subtotal: <span id="checkout-subtotal">$0</span></p>
                        <p>Envío: <span style="color: #00ff00; font-weight: bold;">GRATIS</span></p>
                        <h3>Total <span id="checkout-total">$0</span></h3>
                    </div>
                </div>
            </div>

        </div>
    </section>

    <script src="jvs/pago.js"></script>
</body>
</html>
