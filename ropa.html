<!DOCTYPE html>
<html lang="es">

    <link rel="icon" href="IMAGENES/favicon.png">

<body>
    <header class="header">
        <div class="logo">
            <img src="IMAGENES/favicon.png" alt="Logo">
            <h1>C&E URBAN</h1>
        </div>

        <nav class="navbar">
            <a href="index.html">Inicio</a>
            <div class="dropdown">
                <button class="dropbtn">Productos</button>
                <div class="dropdown-content">
                    <a href="productos.html">Todos</a>
                    <a href="ropa.html">Ropa</a>
                    <a href="accesorios.html">Accesorios</a>
                    <a href="vehiculos.html">Vehículos</a>
                    <a href="tecnologia.html">Tecnología</a>

            </div>
            <a href="index.html#collections">Colecciones</a>
            <a href="index.html#nosotros">Nosotros</a>

        <div class="menu-toggle">☰</div>

        <div class="icons">

            <span>👤</span>

        <div class="hero-img">
            <img src="IMAGENES/Nueva colleccion.jpeg" alt="Ropa">
        </div>

    <section class="productos">
        <div class="productos-header">
            <h2>Ropa destacada</h2>
            <a href="productos.html">Ver todos</a>
        </div>
        <div class="productos-grid" id="productos-container" data-category="ropa"></div>

    <script src="jvs/category.js"></script>
